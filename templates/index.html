<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Career Intelligence System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:linear-gradient(135deg,#0d6efd,#6610f2);
    height:100vh;
}

.upload-card{
    background:white;
    border-radius:20px;
}

</style>

</head>

<body>

<div class="container h-100 d-flex justify-content-center align-items-center">

<div class="card upload-card shadow-lg p-5" style="width:700px;">

<h1 class="text-center mb-3">
🚀 AI Career Intelligence System
</h1>

<p class="text-center text-muted">

Deep Learning Based Resume Analysis,
Role Prediction, Skill Gap Analysis
and Learning Recommendation System

</p>

<form action="/analyze" method="POST" enctype="multipart/form-data">

<div class="mb-4">

<label class="form-label">

Upload Resume (PDF)

</label>

<input
type="file"
name="resume"
class="form-control"
accept=".pdf"
required>

</div>

<button
type="submit"
class="btn btn-primary w-100 btn-lg">

Analyze Resume

</button>

</form>

</div>

</div>

</body>
</html>
